name: Smoke Test

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: server
        shell: bash

    env:
      NODE_ENV: test
      PORT: "4000"
      JWT_SECRET: "ci-test-secret-0123456789abcdef0123456789abcdef"
      DATABASE_URL: "file:./prisma/ci.db"
      CORS_ORIGINS: "http://localhost:5500,http://127.0.0.1:5500"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('server/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install server deps
        run: npm ci

      - name: Reset CI sqlite file
        run: rm -f prisma/ci.db

      - name: Prisma generate
        run: npx prisma generate

      - name: Apply migrations (CI)
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run -s lint

      - name: Tests
        run: npm test

      - name: Start server and hit /api/health
        run: |
          set -euo pipefail
          npm run start > server.log 2>&1 &
          SERVER_PID=$!

          cleanup() { kill "$SERVER_PID" 2>/dev/null || true; }
          trap cleanup EXIT

          for i in $(seq 1 40); do
            if curl -fsS "http://localhost:${PORT}/api/health" > /dev/null; then
              echo "Health OK"
              exit 0
            fi
            sleep 0.5
          done

          echo "Health check failed — printing server.log (first 200 lines)"
          sed -n '1,200p' server.log || true
          exit 1
