name: Smoke Test

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # IMPORTANT: Disable npm cache to avoid lockfile-at-repo-root failures in monorepos.
      # (We can re-enable later once it’s confirmed stable.)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install server deps
        working-directory: server
        run: npm ci

      - name: Prisma generate (ensures client exists)
        working-directory: server
        run: npx prisma generate

      - name: Lint
        working-directory: server
        run: npm run -s lint

      - name: Tests
        working-directory: server
        run: npm test

      - name: Start server and hit /health
        working-directory: server
        env:
          NODE_ENV: test
          JWT_SECRET: "ci-test-secret-change-me"
          DATABASE_URL: "file:./prisma/dev.db"
          ALLOWED_ORIGINS: "http://localhost:5500,http://127.0.0.1:5500"
          PORT: "4000"
        run: |
          set -e
          node -v
          npm run start &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"

          for i in {1..40}; do
            if curl -fsS http://localhost:4000/health > /dev/null; then
              echo "Health OK"
              kill $SERVER_PID
              exit 0
            fi
            sleep 0.5
          done

          echo "Health check failed"
          kill $SERVER_PID || true
          exit 1
