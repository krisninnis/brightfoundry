<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Login – BrightFoundry</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="css/main.css" />
</head>

<body class="portal-auth-body">

  <div class="portal-auth-wrapper">
    
    <!-- LOGO -->
    <div class="portal-auth-logo portal-auth-logo-center">
      <img src="../img/brightfoundry-logo-light.png" alt="BrightFoundry" />
    </div>

    <!-- TITLE + INTRO -->
    <h1 class="portal-auth-title">Sign in</h1>
    <p class="portal-auth-intro portal-auth-intro-center">
      Log in to view your projects, files and support tickets.
    </p>

    <!-- AUTH CARD -->
    <div class="portal-auth-card">

      <form id="login-form" class="portal-auth-form">

        <!-- PROVIDERS -->
        <div class="auth-providers">

          <button type="button" class="auth-provider-btn auth-provider-google" data-provider="google">
            <span class="auth-provider-icon auth-provider-icon-google">G</span>
            <span>Continue with Google</span>
          </button>

          <button type="button" class="auth-provider-btn auth-provider-apple" data-provider="apple">
            <span class="auth-provider-icon auth-provider-icon-apple"></span>
            <span>Continue with Apple</span>
          </button>

          <button type="button" class="auth-provider-btn auth-provider-phone" data-provider="phone">
            <span class="auth-provider-icon auth-provider-icon-phone">📱</span>
            <span>Sign in with mobile</span>
          </button>

        </div>

        <!-- DIVIDER -->
        <div class="auth-divider">
          <span></span>
          <span>or sign in with email</span>
          <span></span>
        </div>

        <!-- EMAIL -->
        <div class="auth-field">
          <label for="login-email">Email</label>
          <input
            id="login-email"
            type="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <!-- PASSWORD -->
        <div class="auth-field">
          <label for="login-password">Password</label>
          <input
            id="login-password"
            type="password"
            placeholder="••••••••"
            required
          />
        </div>

        <!-- REMEMBER + FORGOT -->
        <div class="auth-row">
          <label class="auth-remember">
            <input type="checkbox" />
            <span>Remember me on this device</span>
          </label>
          <a href="#" class="auth-link">Forgot password?</a>
        </div>

        <!-- SUBMIT -->
        <button type="submit" class="portal-btn auth-btn">Sign in</button>

        <!-- ERROR MESSAGE (filled by auth.js) -->
        <p id="login-error" class="auth-error"></p>

        <!-- RETRY (optional, used when server is offline) -->
        <button
          id="login-retry"
          type="button"
          class="portal-btn auth-btn auth-btn-secondary"
        >
          Retry connection
        </button>

        <p class="auth-note">
          For the demo, you can use:
          <br />
          <strong>client@example.com</strong> / <strong>client123</strong>
        </p>
      </form>

    </div>

    <!-- FOOTER -->
    <p class="portal-auth-footer">
      Don’t have an account?
      <a href="register.html" class="auth-link">Request access</a>
    </p>

  </div>

  <!-- Shared config (API + auth helpers), then auth logic -->
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
