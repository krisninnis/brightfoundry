<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Portal Access – BrightFoundry</title>
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="css/main.css" />
</head>

<body class="portal-auth-body">
  <div class="portal-auth-wrapper">

    <!-- LOGO -->
    <div class="portal-auth-logo portal-auth-logo-center">
      <img src="../img/brightfoundry-logo-light.png" alt="BrightFoundry" />
    </div>

    <!-- TITLE + INTRO -->
    <h1 class="portal-auth-title">Request access</h1>
    <p class="portal-auth-intro portal-auth-intro-center">
      Fill in a few details and we’ll set up your client portal account.
    </p>

    <!-- AUTH CARD -->
    <div class="portal-auth-card">

      <form id="register-form" class="portal-auth-form">
        <!-- PROVIDERS (SMALL STACK) -->
        <div class="auth-providers auth-providers-small">
          <button
            type="button"
            class="auth-provider-btn auth-provider-google"
            data-provider="google"
          >
            <span class="auth-provider-icon auth-provider-icon-google">G</span>
            <span>Use Google</span>
          </button>

          <button
            type="button"
            class="auth-provider-btn auth-provider-apple"
            data-provider="apple"
          >
            <span class="auth-provider-icon auth-provider-icon-apple"></span>
            <span>Use Apple</span>
          </button>

          <button
            type="button"
            class="auth-provider-btn auth-provider-phone"
            data-provider="phone"
          >
            <span class="auth-provider-icon auth-provider-icon-phone">📱</span>
            <span>Use mobile</span>
          </button>
        </div>

        <!-- DIVIDER -->
        <div class="auth-divider">
          <span></span>
          <span>or fill in your details</span>
          <span></span>
        </div>

        <!-- FIELDS -->
        <div class="auth-field">
          <label for="reg-name">Name</label>
          <input
            id="reg-name"
            type="text"
            placeholder="Your name"
            required
          />
        </div>

        <div class="auth-field">
          <label for="reg-company">Business / project</label>
          <input
            id="reg-company"
            type="text"
            placeholder="e.g. Bright Bakery"
          />
        </div>

        <div class="auth-field">
          <label for="reg-email">Email</label>
          <input
            id="reg-email"
            type="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <div class="auth-field">
          <label for="reg-password">Create password</label>
          <input
            id="reg-password"
            type="password"
            placeholder="••••••••"
            required
          />
        </div>

        <!-- SUBMIT -->
        <button type="submit" class="portal-btn auth-btn">
          Create account
        </button>

        <p class="auth-note">
          Demo only — this doesn’t create a real account. You’ll be logged straight in.
        </p>
      </form>

    </div>

    <!-- FOOTER -->
    <p class="portal-auth-footer">
      Already have access?
      <a href="login.html" class="auth-link">Sign in</a>
    </p>

  </div>

  <script src="js/auth.js"></script>
</body>
</html>
